<!DOCTYPE html>
<!--
  PER-PAGE SKELETON for a SotA microsite. Copy this for each page and fill the
  placeholders. The look/provenance classes come from styles.css (bundled) — see
  reference/provenance-conventions.md for the full markup vocabulary, and
  reference/site-structure.md for which pages exist and what each covers.

  Replace:
    {{PAGE_TITLE}}   browser tab title
    {{BRAND}}        nav brand, e.g. Codified&nbsp;<span>Context</span> · SotA
    {{NAV}}          the <a class="nav" ...> list — SAME on every page; mark the
                     current page with class="nav active". Generate this once to
                     match THIS corpus's page set, then reuse verbatim across pages.
    {{KICKER}}       small overline, e.g. "01 · Foundations"
    {{H1}} {{LEDE}}  page headline + standfirst
    {{CONTENT}}      the page body (h2/h3, prose, callouts, tables, quotes)
    {{PREV}} {{NEXT}} pager links (href + label)
    {{FOOTER}}       footer line
  Use class="wrap wide" instead of "wrap" for table-heavy pages (e.g. Evidence, Corpus).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PAGE_TITLE}}</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="topnav"><div class="topnav-inner">
  <a class="brand" href="index.html">{{BRAND}}</a>
  {{NAV}}
</div></nav>

<div class="wrap">
  <p class="kicker">{{KICKER}}</p>
  <h1>{{H1}}</h1>
  <p class="lede">{{LEDE}}</p>

  {{CONTENT}}

  <div class="pager">
    <a href="{{PREV}}">← {{PREV_LABEL}}</a>
    <a href="{{NEXT}}">{{NEXT_LABEL}} →</a>
  </div>
</div>

<footer class="site">{{FOOTER}}</footer>
</body>
</html>
